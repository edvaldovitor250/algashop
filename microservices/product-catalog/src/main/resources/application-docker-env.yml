spring:
  cache:
    type: redis
  mongodb:
    uri: mongodb://algashop-mongodb-1:27017,algashop-mongodb-2:27017,algashop-mongodb-3:27017/product_catalog?replicaSet=rs0
  data:
    redis:
      host: algashop-redis
      port: 6379
      password: algashop
      database: 0
      timeout: 600
  cloud:
    discovery:
      client:
        composite-indicator:
          enabled: false

algashop:
  data-load:
    enabled: true
    auto-delete: true
